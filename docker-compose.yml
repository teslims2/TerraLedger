version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: terraledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d terraledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  oracle_verification:
    build: ./oracle
    command: python verification_listener.py
    depends_on:
      - backend

  oracle_price:
    build: ./oracle
    command: python price_oracle.py
    depends_on:
      - backend

  oracle_satellite:
    build: ./oracle
    command: python satellite_monitor.py
    ports:
      - "5001:5001"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3200:3000"
